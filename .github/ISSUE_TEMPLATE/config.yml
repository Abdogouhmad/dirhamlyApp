blank_issues_enabled: false          # disable "Open blank issue" if you want
contact_links:
  - name: 💬 General Discussion / Questions
    url:  https://x.com/a3bdor7man     # or Discord, etc.
    about: Ask questions or discuss ideas here

issue_templates:
  - name: 🐛 Bug Report
    description: Report something that's broken
    title: "[BUG] "
    labels: ["bug"]
    body: |
      **Describe the bug**
      A clear and concise description of what the bug is.
      **To Reproduce**
      Steps to reproduce the behavior:
      1. Go to '...'
      2. Click on '....'
      3. Scroll down to '....'
      4. See error
      **Expected behavior**
      A clear and concise description of what you expected to happen.
      **Screenshots**
      If applicable, add screenshots to help explain your problem.
      **Environment (please complete the following information):**
      - OS: [e.g. iOS]
      - Browser [e.g. chrome, safari]
      - Version [e.g. 22]
      **Additional context**
      Add any other context about the problem here.
  - name: ✨ Feature Request
    description: Suggest an idea for improvement or new feature
    title: "[FEATURE] "
    labels: ["enhancement"]
    body: |
      **Is your feature request related to a problem? Please describe.**
      A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
      **Describe the solution you'd like**
      A clear and concise description of what you want to happen.
      **Describe alternatives you've considered**
      A clear and concise description of any alternative solutions or features you've considered.
      **Additional context**
      Add any other context or screenshots about the feature request here.
      