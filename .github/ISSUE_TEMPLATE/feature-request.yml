name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Great idea! Help us understand it clearly.
  
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: Describe the pain point (optional but helpful).
      placeholder: "I'm always frustrated when..."
  
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      placeholder: "I want to be able to..."
    validations:
      required: true
  
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
  
  - type: textarea
    id: extra
    attributes:
      label: Additional context / screenshots